<!DOCTYPE html>
<html>
<head>
    <title>Bewerbungstracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Meine Bewerbungen</h1>

<form method="get">
    <input type="text" name="suche" placeholder="Firma suchen">
    <select name="status">
        <option value="">
            Alle
        </option>
        <option value="OFFEN">
            OFFEN
        </option>
        <option value="BEWORBEN">
            BEWORBEN
        </option>
        <option value="INTERVIEW">
            INTERVIEW
        </option>
        <option value="ANGEBOT">
            ANGEBOT
        </option>
        <option value="ABGELEHNT">
            ABGELEHNT
        </option>
    </select>
    <button type="submit" class="btn btn-primary">
        Anwenden
    </button>
</form>

<div class="row mb-4">

    <div class="col">
        <div class="card text-center">
            <div class="card-body">
                <h5>Gesamt</h5>
                <h2 th:text="${gesamt}"></h2>
            </div>
        </div>
    </div>

    <div class="col">
        <div class="card text-center">
            <div class="card-body">
                <h5>Offen</h5>
                <h2 th:text="${offen}"></h2>
            </div>
        </div>
    </div>

    <div class="col">
        <div class="card text-center">
            <div class="card-body">
                <h5>Beworben</h5>
                <h2 th:text="${beworben}"></h2>
            </div>
        </div>
    </div>

    <div class="col">
        <div class="card text-center">
            <div class="card-body">
                <h5>Interview</h5>
                <h2 th:text="${interview}"></h2>
            </div>
        </div>
    </div>

    <div class="col">
        <div class="card text-center">
            <div class="card-body">
                <h5>Angebot</h5>
                <h2 th:text="${angebot}"></h2>
            </div>
        </div>
    </div>

    <div class="col">
        <div class="card text-center">
            <div class="card-body">
                <h5>Abgelehnt</h5>
                <h2 th:text="${abgelehnt}"></h2>
            </div>
        </div>
    </div>

</div>

<table class="table table-striped">
    <tr>
        <th>Firma</th>
        <th>Titel</th>
        <th>Datum</th>
        <th>Status</th>
        <th>Details</th>
        <th>Bearbeiten</th>
        <th>Löschen</th>
    </tr>

    <tr th:each="bewerbung : ${bewerbungen}">
        <td th:text="${bewerbung.firma}"></td>
        <td th:text="${bewerbung.titel}"></td>
        <td th:text="${bewerbung.datum}"></td>
        <td>
            <span th:if="${bewerbung.status.name() == 'OFFEN'}" class="badge bg-primary">
                OFFEN
            </span>
            <span th:if="${bewerbung.status.name() == 'BEWORBEN'}" class="badge bg-primary">
                BEWORBEN
            </span>
            <span th:if="${bewerbung.status.name() == 'INTERVIEW'}" class="badge bg-warning">
                INTERVIEW
            </span>
            <span th:if="${bewerbung.status.name() == 'ANGEBOT'}" class="badge bg-success">
                ANGEBOT
            </span>
            <span th:if="${bewerbung.status.name() == 'ABGELEHNT'}" class="badge bg-danger">
                ABGELEHNT
            </span>
        </td>

        <td>
            <a th:href="@{/bewerbungen/{id}(id=${bewerbung.id})}" class="btn btn-info btn-sm">
                Details
            </a>
        </td>

        <td>
            <a th:href="@{/bewerbungen/edit/{id}(id=${bewerbung.id})}" class="btn btn-warning btn-sm">
                Bearbeiten
            </a>
        </td>

        <td>
            <form th:action="@{/bewerbungen/delete/{id}(id=${bewerbung.id})}" method="post">
                <button class="btn btn-danger btn-sm" type="submit">
                    Löschen
                </button>
            </form>
        </td>
    </tr>
</table>

<h2>Neue Bewerbung</h2>

<form action="/bewerbungen" method="post">

    <label>Firma:</label>
    <input class="form-control" name="firma" required>

    <label>Titel:</label>
    <input class="form-control" name="titel" required>

    <label>Link zur Stellenanzeige:</label>
    <input class="form-control" name="stellenLink">

    <label>Notizen:</label>
    <textarea class="form-control" name="notizen" rows="4"></textarea>

    <label>Datum:</label>
    <input type="date" name="datum" required class="form-control">

    <label>Status:</label>

    <select name="status">
        <option value="OFFEN">OFFEN</option>
        <option value="BEWORBEN">BEWORBEN</option>
        <option value="INTERVIEW">INTERVIEW</option>
        <option value="ANGEBOT">ANGEBOT</option>
        <option value="ABGELEHNT">ABGELEHNT</option>
    </select>

    <br><br>

    <button type="submit"  class="btn btn-primary">
        Speichern
    </button>
</form>

</body>
</html>
