<!DOCTYPE html>
<html>
<head>
    <title>Bewerbungstracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Meine Bewerbungen</h1>

<form method="get">
    <input type="text" name="suche" placeholder="Firma suchen">
    <button type="submit" class="btn btn-success">
        Suchen
    </button>
</form>

<form method="get">
    <select name="status">
        <option value="">
            Alle
        </option>
        <option value="OFFEN">
            OFFEN
        </option>
        <option value="BEWORBEN">
            BEWORBEN
        </option>
        <option value="INTERVIEW">
            INTERVIEW
        </option>
        <option value="ANGEBOT">
            ANGEBOT
        </option>
        <option value="ABGELEHNT">
            ABGELEHNT
        </option>
    </select>
    <button class="btn btn-primary" type="submit">
        Filtern
    </button>
</form>

<div class="alert alert-info">
    Gesamt:
    <strong th:text="${gesamt}"></strong>
</div>

<div class="row">
    <div class="col">
        Offen:
        <span th:text="${offen}"></span>
    </div>
    <div class="col">
        Beworben:
        <span th:text="${beworben}"></span>
    </div>
    <div class="col">
        Interview:
        <span th:text="${interview}"></span>
    </div>
    <div class="col">
        Angebot:
        <span th:text="${angebot}"></span>
    </div>
    <div class="col">
        Abgelehnt:
        <span th:text="${abgelehnt}"></span>
    </div>
</div>

<table class="table table-striped">
    <tr>
        <th>Firma</th>
        <th>Titel</th>
        <th>Datum</th>
        <th>Status</th>
        <th>Bearbeiten</th>
        <th>Löschen</th>
    </tr>

    <tr th:each="bewerbung : ${bewerbungen}">
        <td th:text="${bewerbung.firma}"></td>
        <td th:text="${bewerbung.titel}"></td>
        <td th:text="${bewerbung.datum}"></td>
        <td th:text="${bewerbung.status}"></td>

        <td>
            <a th:href="@{/bewerbungen/edit/{id}(id=${bewerbung.id})}" class="btn btn-warning btn-sm">
                Bearbeiten
            </a>
        </td>

        <td>
            <form th:action="@{/bewerbungen/delete/{id}(id=${bewerbung.id})}" method="post">
                <button class="btn btn-danger btn-sm" type="submit">
                    Löschen
                </button>
            </form>
        </td>
    </tr>
</table>

<h2>Neue Bewerbung</h2>

<form action="/bewerbungen" method="post">

    <label>Firma:</label>
    <input type="text" name="firma" required>

    <br><br>

    <label>Titel:</label>
    <input type="text" name="titel" required>

    <br><br>

    <label>Datum:</label>
    <input type="date" name="datum" required class="form-control">

    <br><br>

    <label>Status:</label>

    <select name="status">
        <option value="OFFEN">OFFEN</option>
        <option value="BEWORBEN">BEWORBEN</option>
        <option value="INTERVIEW">INTERVIEW</option>
        <option value="ANGEBOT">ANGEBOT</option>
        <option value="ABGELEHNT">ABGELEHNT</option>
    </select>

    <br><br>

    <button type="submit"  class="btn btn-primary">
        Speichern
    </button>
</form>

</body>
</html>
