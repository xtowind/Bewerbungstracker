<!DOCTYPE html>
<html>
<head>
    <title>Bewerbungstracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h1>Meine Bewerbungen</h1>

<table class="table table-striped">
    <tr>
        <th>Firma</th>
        <th>Titel</th>
        <th>Datum</th>
        <th>Status</th>
        <th>Bearbeiten</th>
        <th>Löschen</th>
    </tr>

    <tr th:each="bewerbung : ${bewerbungen}">
        <td th:text="${bewerbung.firma}"></td>
        <td th:text="${bewerbung.titel}"></td>
        <td th:text="${bewerbung.datum}"></td>
        <td th:text="${bewerbung.status}"></td>

        <td>
            <a th:href="@{/bewerbungen/edit/{id}(id=${bewerbung.id})}" class="btn btn-warning btn-sm">
                Bearbeiten
            </a>
        </td>

        <td>
            <form th:action="@{/bewerbungen/delete/{id}(id=${bewerbung.id})}" method="post">
                <button class="btn btn-danger btn-sm" type="submit">
                    Löschen
                </button>
            </form>
        </td>
    </tr>
</table>

<h2>Neue Bewerbung</h2>

<form action="/bewerbungen" method="post">

    <label>Firma:</label>
    <input type="text" name="firma" required>

    <br><br>

    <label>Titel:</label>
    <input type="text" name="titel" required>

    <br><br>

    <label>Datum:</label>
    <input type="text" name="datum" required>

    <br><br>

    <label>Status:</label>

    <select name="status">
        <option value="OFFEN">OFFEN</option>
        <option value="BEWORBEN">BEWORBEN</option>
        <option value="INTERVIEW">INTERVIEW</option>
        <option value="ANGEBOT">ANGEBOT</option>
        <option value="ABGELEHNT">ABGELEHNT</option>
    </select>

    <br><br>

    <button type="submit"  class="btn btn-primary">
        Speichern
    </button>
</form>

</body>
</html>
