<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bewerbungsdetails</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="container mt-5">
    <a class="btn btn-secondary"
            href="/">
        Zurück
    </a>
    <a th:href="@{/bewerbungen/edit/{id}(id=${bewerbung.id})}"
            class="btn btn-primary">
        Bearbeiten
    </a>
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow">
            <h2 class="card-title"
                th:text="${bewerbung.firma}">
            </h2>
            <hr>
            <p>
                <strong>Titel:</strong>
                <span th:text="${bewerbung.titel}"></span>
            </p>
            <p>
                <strong>Status:</strong>
                <span th:text="${bewerbung.status}" th:classappend="${
                    bewerbung.status.name() == 'OFFEN' ? 'bg-bg-primary' :
                    bewerbung.status.name() == 'BEWORBEN' ? 'bg-primary' :
                    bewerbung.status.name() == 'INTERVIEW' ? 'bg-warning' :
                    bewerbung.status.name() == 'ANGEBOT' ? 'bg-success' :
                    'bg-danger'}" class="badge">
                </span>
            </p>
            <p>
                <strong>Datum:</strong>
                <span th:text="${bewerbung.datum}"></span>
            </p>
                <div th:if="${bewerbung.notizen != null && !bewerbung.notizen.isBlank()}">
                    <strong>Notizen:</strong>
                    <div class="border rounded p-3 mt-2">
                        <span th:text="${bewerbung.notizen}"></span>
                    </div>
                </div>
                <div th:unless="${bewerbung.notizen != null && !bewerbung.notizen.isBlank()}">
                    <strong>Notizen:</strong>
                    <p class="text-muted">
                        Keine Notizen vorhanden
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
